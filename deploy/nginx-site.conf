# Nginx trên host: TLS tại cổng 5454, proxy tới Docker (127.0.0.1:5454 khi FRONTEND_BIND=127.0.0.1, FRONTEND_PORT=5454).
# Cài: sudo cp deploy/nginx-site.conf /etc/nginx/sites-available/food-order
#      sudo ln -sf /etc/nginx/sites-available/food-order /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx
#
# Chứng chỉ: không dùng cổng 80/443 thì dùng certbot DNS (hoặc copy fullchain/privkey vào đường dẫn dưới).

upstream frappe_docker {
    server 127.0.0.1:5454;
    keepalive 64;
}

server {
    listen 5454 ssl http2;
    listen [::]:5454 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_pass http://frappe_docker;
    }
}
