upstream erpnext_backend {
    server 127.0.0.1:4455;
    keepalive 64;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name bepan.vnpt-tuyenquang.vn;

    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bepan.vnpt-tuyenquang.vn;

    ssl_certificate     /etc/letsencrypt/live/bepan.vnpt-tuyenquang.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bepan.vnpt-tuyenquang.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://erpnext_backend;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_read_timeout 120s;
    }
}