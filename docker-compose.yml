services:
  backend:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      create-site:
        condition: service_completed_successfully
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ZALO_APP_ID: ${ZALO_APP_ID}
      ZALO_SECRET: ${ZALO_SECRET}
      ZALO_OA_ACCESS_TOKEN: ${ZALO_OA_ACCESS_TOKEN}
      GROUP_ID_ZALO: ${GROUP_ID_ZALO}
      ZALO_REDIRECT_URI: ${ZALO_REDIRECT_URI}
      BASE_URL: ${BASE_URL}

  configurator:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  create-site:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    restart: "no"
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        if [ -d "sites/${SITE_NAME:-frontend}" ]; then
          echo "Site ${SITE_NAME:-frontend} already exists, skipping bench new-site.";
          exit 0;
        fi;
        bench new-site ${SITE_NAME:-frontend}
          --mariadb-user-host-login-scope='%'
          --admin-password=${ADMIN_PASSWORD}
          --db-root-username=root
          --db-root-password=${MYSQL_ROOT_PASSWORD}
          --install-app erpnext
          --set-default;

  db:
    image: mariadb:10.6
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql

  frontend:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    depends_on:
      - websocket
      - backend
    restart: unless-stopped
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:-frontend}
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-172.16.0.0/12}
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-4455}:8080"

  queue-long:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  redis-queue:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

  redis-cache:
    image: redis:6.2-alpine
    networks:
      - frappe_network
    restart: unless-stopped

  scheduler:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - bench
      - schedule
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs

  websocket:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v15}
    networks:
      - frappe_network
    restart: unless-stopped
    depends_on:
      create-site:
        condition: service_completed_successfully
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      
  nginx:
    image: nginx:alpine
    networks:
      - frappe_network
    depends_on:
      - frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-site.conf:/etc/nginx/conf.d/default.conf

volumes:
  db-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_network:
    driver: bridge
